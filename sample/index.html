<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>pIvotX — Clock Demo</title>
    <script src="../pIvotX/pIvotX.js" type="text/javascript"></script>
  </head>
  <body>
    <canvas id="myCanvas" width="400" height="400"
      style="border:1px solid #d3d3d3; background-color:white;">
      Your browser does not support the HTML5 canvas tag.
    </canvas>

    <script type="text/javascript">
      var canvas = new Canvas("myCanvas");
      var radius = canvas.getHeight() / 2;
      var ctx    = canvas._2Dcontext;

      drawClock();

      function drawClock() {
        drawClockFace();
        drawNumbers();
        drawHands();
      }

      function drawClockFace() {
        // Outer circle
        var face = new Circle(canvas.getCenter(), radius * 0.9);
        face.fillColor   = "white";
        face.strokeColor = "#333";
        canvas.add(face);

        // Centre dot — FIX: was using _centerPint (typo), now centerPoint
        var dot = new Circle(canvas.getCenter(), radius * 0.05);
        dot.fillColor = "#333";
        canvas.add(dot);
      }

      function drawNumbers() {
        var center = canvas.getCenter();
        for (var num = 1; num <= 12; num++) {
          var ang = (num * Math.PI / 6) - Math.PI / 2;
          var x   = center.x + Math.cos(ang) * radius * 0.75;
          var y   = center.y + Math.sin(ang) * radius * 0.75;

          // FIX: Label now properly accepts text and position
          var label = new Label(num.toString(), Point(x, y), radius * 0.15 + "px Arial");
          label.fillColor = "#333";
          canvas.add(label);
        }
      }

      function drawHands() {
        var now    = new Date();
        var center = canvas.getCenter();

        // Hour hand
        var hourAng = ((now.getHours() % 12) + now.getMinutes() / 60) * Math.PI / 6 - Math.PI / 2;
        drawHand(center, hourAng, radius * 0.5, 6, "#333");

        // Minute hand
        var minAng = (now.getMinutes() + now.getSeconds() / 60) * Math.PI / 30 - Math.PI / 2;
        drawHand(center, minAng, radius * 0.75, 4, "#333");

        // Second hand
        var secAng = now.getSeconds() * Math.PI / 30 - Math.PI / 2;
        drawHand(center, secAng, radius * 0.85, 2, "red");
      }

      function drawHand(center, angle, length, width, color) {
        var endX = center.x + Math.cos(angle) * length;
        var endY = center.y + Math.sin(angle) * length;
        var hand = new Line(center, Point(endX, endY));
        hand.strokeColor = color;
        hand.lineWidth   = width;
        canvas.add(hand);
      }

      // ── Live clock using the game loop ──────────────────────────────────────
      canvas.startLoop(function (dt) {
        canvas.clear();
        drawClock();
      });
    </script>
  </body>
</html>
